<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Password Manager</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
min-height:100vh;

background:
radial-gradient(circle at 20% 30%, #220000, transparent 40%),
radial-gradient(circle at 80% 70%, #330000, transparent 40%),
linear-gradient(180deg,#000000,#1a0000,#000000);

overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

h1{
margin-top:30px;
color:#ff0000;
text-shadow:0 0 10px #ff0000,0 0 20px #ff0000,0 0 40px #ff0000;
}

.container{
margin:auto;
margin-top:30px;
width:90%;
max-width:520px;
padding:25px;
border-radius:18px;

border:3px solid #ff0000;

box-shadow:
0 0 15px #ff0000,
0 0 40px #ff0000,
0 0 60px #8b0000,
inset 0 0 20px #550000;

background:rgba(20,0,0,0.8);
}

input{
width:90%;
padding:12px;
margin:7px;
border:none;
border-radius:10px;
background:#1a0000;
color:white;
box-shadow:0 0 10px #ff0000,inset 0 0 10px #550000;
}

button{
padding:10px 18px;
margin:6px;
border:none;
border-radius:10px;
background:#8b0000;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 15px #ff0000,0 0 30px #ff0000;
}

.item{
background:#220000;
padding:12px;
margin-top:12px;
border-radius:10px;
box-shadow:0 0 10px #ff0000,0 0 20px #550000;
}

.hidden{display:none;}

#strengthBar{
width:90%;
height:12px;
background:#330000;
margin:auto;
margin-top:10px;
border-radius:10px;
overflow:hidden;
}

#strength{
height:100%;
width:0%;
background:red;
transition:0.3s;
}

#percent{
margin-top:5px;
color:#ff5555;
text-shadow:0 0 10px red;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<h1>🔒 Cyber Password Manager</h1>

<div id="loginBox" class="container">
<h3>Masukkan PIN</h3>
<input type="password" id="pinInput">
<br>
<button onclick="login()">Login</button>
</div>

<div id="app" class="container hidden">

<input id="search" placeholder="Search password..." onkeyup="searchPass()">

<h3>Tambah Password</h3>

<input id="site" placeholder="Website">
<input id="username" placeholder="Username">
<input id="password" placeholder="Password" onkeyup="checkStrength()">

<div id="strengthBar">
<div id="strength"></div>
</div>

<div id="percent">0%</div>

<br>

<button onclick="generate()">Generate</button>
<button onclick="addPass()">Add Password</button>

<p>Total Password: <span id="count">0</span></p>

<div id="list"></div>

</div>


<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

/* FIREBASE CONFIG */

const firebaseConfig = {
  apiKey: "AIzaSyDGtEHVUEoc8B_IgEGaBzsjS4cHfrP_vJk",
  authDomain: "cyber-password-manager.firebaseapp.com",
  projectId: "cyber-password-manager",
  storageBucket: "cyber-password-manager.firebasestorage.app",
  messagingSenderId: "562208995783",
  appId: "1:562208995783:web:cf28ed22deb58911d101e2"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

/* PIN LOGIN */

const pin = "1234";

function login(){

let input=document.getElementById("pinInput").value

if(input===pin){

document.getElementById("loginBox").classList.add("hidden")
document.getElementById("app").classList.remove("hidden")

loadData()

}else{

alert("PIN salah")

}

}

/* ADD PASSWORD */

function addPass(){

let site=document.getElementById("site").value
let user=document.getElementById("username").value
let pass=document.getElementById("password").value

if(site==""||user==""||pass==""){
alert("Isi semua data!")
return
}

db.collection("passwords").add({
site:site,
user:user,
pass:pass
})

.then(()=>{
loadData()
})

}

/* LOAD DATA */

function loadData(){

let list=document.getElementById("list")
list.innerHTML=""

db.collection("passwords").get().then((data)=>{

let i=0

data.forEach((doc)=>{

let item=doc.data()

list.innerHTML+=`

<div class="item">

<b>${item.site}</b><br>

User: ${item.user}<br>

Pass: <span id="p${i}">••••••</span><br>

<button onclick="toggle(${i},'${item.pass}')">Show</button>

<button onclick="copyPass('${item.pass}')">Copy</button>

</div>

`

i++

})

document.getElementById("count").innerText=i

})

}

/* TOGGLE */

function toggle(i,pass){

let el=document.getElementById("p"+i)

if(el.innerText==="••••••"){
el.innerText=pass
}else{
el.innerText="••••••"
}

}

/* COPY */

function copyPass(pass){

navigator.clipboard.writeText(pass)

alert("Password copied!")

}

/* GENERATE */

function generate(){

let chars="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%"

let pass=""

for(let i=0;i<12;i++){

pass+=chars[Math.floor(Math.random()*chars.length)]

}

document.getElementById("password").value=pass

checkStrength()

}

/* STRENGTH */

function checkStrength(){

let pass=document.getElementById("password").value

let strength=0

if(pass.length>6) strength+=25
if(pass.match(/[A-Z]/)) strength+=25
if(pass.match(/[0-9]/)) strength+=25
if(pass.match(/[^A-Za-z0-9]/)) strength+=25

let bar=document.getElementById("strength")

bar.style.width=strength+"%"

document.getElementById("percent").innerText=strength+"%"

if(strength<50) bar.style.background="red"
else if(strength<75) bar.style.background="orange"
else bar.style.background="lime"

}

/* SEARCH */

function searchPass(){

let keyword=document.getElementById("search").value.toLowerCase()

let items=document.querySelectorAll(".item")

items.forEach(item=>{

if(item.innerText.toLowerCase().includes(keyword)){
item.style.display="block"
}else{
item.style.display="none"
}

})

}

/* PARTICLE BACKGROUND */

let canvas=document.getElementById("bg")
let ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

resize()
window.addEventListener("resize",resize)

let particles=[]

for(let i=0;i<150;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*1
})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#ff0000"

particles.forEach(p=>{

ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fill()

p.y+=p.speed

if(p.y>canvas.height){
p.y=0
}

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
  </html>
